name: .NET

on:
  push:
    branches: [ "development" ]
  pull_request:
    branches: [ "development" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore SamiSpot.sln

    - name: Build
      run: dotnet build SamiSpot.sln --no-restore

    - name: Test
      run: dotnet test SamiSpot1.Tests/SamiSpot1.Tests.csproj --no-build --verbosity normal
