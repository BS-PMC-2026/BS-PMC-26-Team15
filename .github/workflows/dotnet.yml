name: .NET

on:
  push:
    branches: [ "development" ]
  pull_request:
    branches: [ "development" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ASPNETCORE_ENVIRONMENT: Testing
      DOTNET_ENVIRONMENT: Testing

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore SamiSpot.sln

    - name: Build
      run: dotnet build SamiSpot.sln --no-restore

    - name: Test
      run: dotnet test SamiSpot1.Tests/SamiSpot1.Tests.csproj --verbosity normal

    - name: Publish
      run: dotnet publish SamiSpot.sln -c Release -o publish

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: samispot-build-${{ github.run_number }}
        path: publish
        if-no-files-found: error
        retention-days: 14
